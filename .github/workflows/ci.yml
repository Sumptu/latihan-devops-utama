name: CI/CD Pipeline
on: [push]

jobs:
  build-dan-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Tarik Kode dari Repositori
        uses: actions/checkout@v3

      - name: 2. Buka Brankas dan Login ke Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 3. Rakit Kontainer dan Kirim ke Gudang
        run: |
          docker build -t sumtu/web-narendra:latest .
          docker push sumtu/web-narendra:latest
